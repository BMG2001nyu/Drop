name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Create .env.local for build
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder_anon_key
          SUPABASE_SERVICE_ROLE_KEY=placeholder_service_role_key
          GEMINI_API_KEY=placeholder_gemini_key
          ELEVENLABS_API_KEY=placeholder_elevenlabs_key
          ELEVENLABS_VOICE_ID=placeholder_voice_id
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_placeholder
          CLERK_SECRET_KEY=sk_test_placeholder
          NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
          EOF

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
          GEMINI_API_KEY: placeholder_gemini_key
          ELEVENLABS_API_KEY: placeholder_elevenlabs_key
          ELEVENLABS_VOICE_ID: placeholder_voice_id
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder

      - name: Check for .env.local in diff
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '\.env\.local'; then
            echo "❌ .env.local found in PR — remove it before merging"
            exit 1
          fi
          echo "✅ No .env files in PR"
