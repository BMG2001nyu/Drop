name: CI

on:
  push:
    branches: [main, milestone-3, milestone-4, milestone-5, milestone-6, milestone-7, milestone-8, milestone-9, milestone-10]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint · Type Check · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      # Provide dummy env vars so Next.js build doesn't crash on missing keys.
      # Real secrets are only needed at runtime, not build time.
      - name: Create .env.local for build
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder_anon_key
          SUPABASE_SERVICE_ROLE_KEY=placeholder_service_role_key
          GEMINI_API_KEY=placeholder_gemini_key
          ELEVENLABS_API_KEY=placeholder_elevenlabs_key
          ELEVENLABS_VOICE_ID=placeholder_voice_id
          EOF

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
          GEMINI_API_KEY: placeholder_gemini_key
          ELEVENLABS_API_KEY: placeholder_elevenlabs_key
          ELEVENLABS_VOICE_ID: placeholder_voice_id
